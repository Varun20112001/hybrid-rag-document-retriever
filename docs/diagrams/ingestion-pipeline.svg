  <path d="M1133 480V522H691V548" stroke="#374151" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <polygon points="342,236 330,229 330,243" fill="#374151"/>
  <polygon points="646,236 634,229 634,243" fill="#374151"/>
